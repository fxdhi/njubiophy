name: Build epub_to_cbz.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 PyInstaller
        run: pip install pyinstaller

      - name: 打包为 exe
        run: pyinstaller --onefile --console --name epub_to_cbz epub_to_cbz.py

      - name: 上传 exe 为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub_to_cbz
          path: dist/epub_to_cbz.exe
          retention-days: 30
